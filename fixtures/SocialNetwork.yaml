App\Entity\SocialNetwork\LinkedinSocialNetwork:
  social_networks_{1..20}:
    socialNetworkId: '<numberBetween(100000000000000, 999999999999999)>'
    organization: '@organization_*'
    username: '<username()>'
    avatarUrl: 'https://avatar.vercel.sh/personal.png'
    name: '<username()>'
    token: '<uuid()>'
    status: 'active'

